services:
  pincer:
    build:
      context: .
      target: runtime
    container_name: pincer
    working_dir: /app/data
    env_file:
      - path: .env
        required: false
      - path: ../.env
        required: false
    environment:
      - PINCER_DATA_DIR=/app/data
      - PINCER_DASHBOARD_HOST=0.0.0.0
      - PINCER_DASHBOARD_PORT=8080
      - PINCER_DASHBOARD_DIST=/app/dashboard/dist
    volumes:
      - pincer-data:/app/data
      - ./skills:/app/skills:ro
    ports:
      - "${PINCER_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: pincer-ngrok
    profiles:
      - ngrok
    command: ["http", "pincer:8080"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      pincer:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pincer-data:
    name: pincer-data

networks:
  pincer-net:
    name: pincer-net
